[phases.setup]
nixPkgs = ["php83", "php83Extensions.intl", "php83Extensions.pdo_pgsql", "php83Extensions.bcmath", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.fileinfo", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.mbstring", "nodejs_20", "git"]

[phases.build]
cmds = [
    "npm install && npm run build",
    "composer install --no-dev --optimize-autoloader --no-interaction"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"